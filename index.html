<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organization Homepage</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    padding:20px;
}

.container{
    width:100%;
    max-width:550px;
    text-align:center;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:25px;
    padding:40px 30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* Logo Circle */
.logo-container{
    width:150px;
    height:150px;
    margin:0 auto 25px;
    border-radius:50%;
    background:#ffffff;
    border:5px solid #ffffff;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.25);
}

.logo-container img{
    width:90%;
    height:90%;
    object-fit:contain; /* Makes logo fit inside circle */
}

/* Organization Name */
h1{
    color:#ffffff;
    font-size:2rem;
    margin-bottom:10px;
}

.tagline{
    color:#cbd5e1;
    margin-bottom:35px;
    font-size:15px;
}

/* Social Links */
.social-links{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.social-links a{
    text-decoration:none;
    color:white;
    padding:16px;
    border-radius:12px;
    font-size:17px;
    font-weight:600;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    transition:all 0.3s ease;
}

.social-links a:hover{
    transform:translateY(-3px);
}

.facebook{
    background:#1877F2;
}

.instagram{
    background:linear-gradient(
        45deg,
        #f09433,
        #e6683c,
        #dc2743,
        #cc2366,
        #bc1888
    );
}

.tiktok{
    background:#000000;
}

.website{
    background:#16a34a;
}

footer{
    margin-top:30px;
    color:#94a3b8;
    font-size:14px;
}

@media(max-width:600px){

    .container{
        padding:30px 20px;
    }

    h1{
        font-size:1.7rem;
    }

    .logo-container{
        width:130px;
        height:130px;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- Replace logo.png with your logo -->
    <!-- <div class="logo-container">
        <img src="logo.png" alt="Organization Logo">
    </div> -->

    <h1>Dream Abroad Educational Consultants Pvt.Ltd</h1>

    <div class="social-links">

        <a href="https://www.facebook.com/DreamAbroad.np" target="_blank" class="facebook">
            <i class="fab fa-facebook-f"></i>
            Facebook
        </a>

        <a href="https://www.instagram.com/dreamabroad.np" target="_blank" class="instagram">
            <i class="fab fa-instagram"></i>
            Instagram
        </a>

        <a href="https://www.tiktok.com/@dreamabroad.np" target="_blank" class="tiktok">
            <i class="fab fa-tiktok"></i>
            TikTok
        </a>

        <a href="https://dreamabroad.com.np" target="_blank" class="website">
            <i class="fas fa-globe"></i>
            Official Website
        </a>

    </div>

    <footer>
        © 2026 Dream Abroad Educational Consultants Pvt.Ltd. All Rights Reserved.
    </footer>

</div>

</body>
</html>
